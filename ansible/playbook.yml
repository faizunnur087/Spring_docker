---
- name: Deploy Spring Boot in Docker
  hosts: all
  become: yes

  vars:
    app_dir: /opt/app
    app_port: 8080
    app_container_name: spring-app
    java_version: "21"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - nginx
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset SSH connection so group change takes effect
      meta: reset_connection

    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Configure nginx reverse proxy
      copy:
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: "0644"
        content: |
          server {
              listen 80 default_server;
              listen [::]:80 default_server;
              server_name _;
              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_connect_timeout 60s;
                  proxy_read_timeout 60s;
              }
          }

    - name: Restart nginx
      service:
        name: nginx
        state: restarted

    - name: Install local DB if requested (postgres)
      block:
        - name: Install PostgreSQL
          apt:
            name: postgresql
            state: present
            update_cache: yes

        - name: Start and enable PostgreSQL
          service:
            name: postgresql
            state: started
            enabled: yes

        - name: Fix pg_hba.conf auth to md5
          shell: |
            HBA=$(find /etc/postgresql -name pg_hba.conf | head -1)
            sed -i 's/scram-sha-256/md5/g' "$HBA"
            systemctl reload postgresql
          args:
            executable: /bin/bash

        - name: Create PostgreSQL database
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db_name }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE {{ db_name }};"
          args:
            executable: /bin/bash

        - name: Create PostgreSQL user
          shell: |
            sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db_username }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER {{ db_username }} WITH ENCRYPTED PASSWORD '{{ db_password }}';"
          args:
            executable: /bin/bash

        - name: Grant privileges to PostgreSQL user
          shell: |
            sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_username }};"
          args:
            executable: /bin/bash
      when: install_db is defined and install_db == 'true' and db_type is defined and db_type == 'postgres'

    - name: Install local DB if requested (mysql)
      block:
        - name: Install MySQL
          apt:
            name: mysql-server
            state: present
            update_cache: yes

        - name: Start and enable MySQL
          service:
            name: mysql
            state: started
            enabled: yes

        - name: Create MySQL database and user
          shell: |
            mysql -e "CREATE DATABASE IF NOT EXISTS {{ db_name }};"
            mysql -e "CREATE USER IF NOT EXISTS '{{ db_username }}'@'localhost' IDENTIFIED BY '{{ db_password }}';"
            mysql -e "GRANT ALL ON {{ db_name }}.* TO '{{ db_username }}'@'localhost';"
            mysql -e "FLUSH PRIVILEGES;"
          args:
            executable: /bin/bash
      when: install_db is defined and install_db == 'true' and db_type is defined and db_type == 'mysql'

    - name: Install local DB if requested (mongodb)
      block:
        - name: Install MongoDB
          apt:
            name: mongodb-org
            state: present
            update_cache: yes

        - name: Start and enable MongoDB
          service:
            name: mongod
            state: started
            enabled: yes

        - name: Create MongoDB database and collection
          shell: |
            mongosh --eval "db.getSiblingDB('{{ db_name }}').createCollection('init')"
          args:
            executable: /bin/bash
      when: install_db is defined and install_db == 'true' and db_type is defined and db_type == 'mongodb'

    - name: Wipe old app directory
      file:
        path: "{{ app_dir }}"
        state: absent
      ignore_errors: yes

    - name: Recreate app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: "0755"

    - name: Copy all project files to server
      copy:
        src: ../
        dest: "{{ app_dir }}/"
        mode: "0755"

    - name: Copy compiled JAR to app directory
      copy:
        src: "jar/{{ jar_name }}"
        dest: "{{ app_dir }}/app.jar"
        mode: "0644"

    - name: Write Dockerfile
      copy:
        dest: "{{ app_dir }}/Dockerfile"
        owner: root
        group: root
        mode: "0644"
        content: |
          FROM eclipse-temurin:{{ java_version }}-jre
          WORKDIR /app
          COPY app.jar app.jar
          EXPOSE {{ app_port }}
          ENTRYPOINT ["java", "-jar", "app.jar"]

    - name: Write .env file
      shell: |
        printf '' > {{ app_dir }}/.env
        {% if spring_datasource_url is defined and spring_datasource_url %}
        printf 'SPRING_DATASOURCE_URL=%s\n' '{{ spring_datasource_url }}' >> {{ app_dir }}/.env
        printf 'SPRING_DATASOURCE_USERNAME=%s\n' '{{ spring_datasource_username | default('') }}' >> {{ app_dir }}/.env
        printf 'SPRING_DATASOURCE_PASSWORD=%s\n' '{{ spring_datasource_password | default('') }}' >> {{ app_dir }}/.env
        {% endif %}
        {% if spring_data_mongodb_uri is defined and spring_data_mongodb_uri %}
        printf 'SPRING_DATA_MONGODB_URI=%s\n' '{{ spring_data_mongodb_uri }}' >> {{ app_dir }}/.env
        {% endif %}
        {% if spring_profiles_active is defined and spring_profiles_active %}
        printf 'SPRING_PROFILES_ACTIVE=%s\n' '{{ spring_profiles_active }}' >> {{ app_dir }}/.env
        {% endif %}
      args:
        executable: /bin/bash

    - name: Stop existing container
      shell: docker stop {{ app_container_name }} || true
      args:
        executable: /bin/bash

    - name: Remove existing container
      shell: docker rm {{ app_container_name }} || true
      args:
        executable: /bin/bash

    - name: Remove old image to force rebuild
      shell: docker rmi {{ app_container_name }}:latest || true
      args:
        executable: /bin/bash

    - name: Build Docker image
      shell: docker build --no-cache -t {{ app_container_name }}:latest {{ app_dir }}/
      args:
        executable: /bin/bash

    - name: Run Docker container
      shell: >
        docker run -d
        --name {{ app_container_name }}
        --network host
        --restart always
        {% if spring_datasource_url is defined and spring_datasource_url %}
        -e SPRING_DATASOURCE_URL='{{ spring_datasource_url }}'
        -e SPRING_DATASOURCE_USERNAME='{{ spring_datasource_username | default('') }}'
        -e SPRING_DATASOURCE_PASSWORD='{{ spring_datasource_password | default('') }}'
        {% endif %}
        {% if spring_data_mongodb_uri is defined and spring_data_mongodb_uri %}
        -e SPRING_DATA_MONGODB_URI='{{ spring_data_mongodb_uri }}'
        {% endif %}
        {% if spring_profiles_active is defined and spring_profiles_active %}
        -e SPRING_PROFILES_ACTIVE='{{ spring_profiles_active }}'
        {% endif %}
        {{ app_container_name }}:latest
      args:
        executable: /bin/bash

    - name: Wait for Spring Boot to start
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        delay: 15
        timeout: 120
        state: started
      ignore_errors: yes
      register: port_wait

    - name: Capture Docker logs if startup failed
      command: docker logs --tail 100 {{ app_container_name }}
      register: service_logs
      when: port_wait is failed
      changed_when: false
      ignore_errors: yes

    - name: Show Docker logs
      debug:
        msg: "{{ service_logs.stdout_lines | default(service_logs.stderr_lines) }}"
      when: port_wait is failed

    - name: Fail if Spring Boot did not start
      fail:
        msg: "Spring Boot did not start on port {{ app_port }}. See docker logs output above."
      when: port_wait is failed

    - name: Report server IP
      debug:
        msg: "server_ip={{ ansible_host }}"

    - name: Verify container is running
      shell: docker ps --filter name={{ app_container_name }} --filter status=running --format '{{ '{{' }}.Names{{ '}}' }}'
      register: container_check
      retries: 3
      delay: 5
      until: container_check.stdout != ""
      become: yes

    - name: Report deployment success
      debug:
        msg: "Spring Boot deployed successfully. Live at http://{{ ansible_host }}/"